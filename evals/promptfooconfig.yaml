description: "lessons-learned lesson effectiveness eval suite"

# Primary agent provider — runs Claude Code in a materialized workspace
providers:
  - id: file://providers/claude-agent.mjs
    label: claude-code
    config:
      model: claude-sonnet-4-6
      timeout: 300000        # 5 min per arm

# Judge providers are referenced inline in scenario assertions, not here.
# This avoids API key validation on startup when no scenarios are loaded.
# Phase 2: add assertions that reference anthropic:messages:claude-sonnet-4-6-20251022
# and openai:chat:o4-mini by label.

# Prompt template — each scenario test overrides this via vars.prompt or a file reference.
# Phase 1 placeholder: real scenario prompts come from PROMPT.md files in Phase 2.
prompts:
  - '{{prompt}}'

defaultTest:
  options:
    # All tests use the claude-code provider unless overridden
    provider: file://providers/claude-agent.mjs
    timeout: 300000

tests:
  # TC-H3: Hardcoded secrets — hint type
  - description: "TC-H3 hardcoded-secrets [control]"
    vars:
      scenarioId: TC-H3-hardcoded-secrets
      prompt: "{{file://scenarios/TC-H3-hardcoded-secrets/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-H3 hardcoded-secrets [treatment]"
    vars:
      scenarioId: TC-H3-hardcoded-secrets
      prompt: "{{file://scenarios/TC-H3-hardcoded-secrets/PROMPT.md}}"
      intervention:
        type: lesson
        ids:
          - never-write-literal-secret-values-into-s-b226
    assert:
      - type: javascript
        value: "file://scripts/assert-hidden-check.mjs"

  # TC-G1: Pytest hang prevention — guard type
  - description: "TC-G1 pytest-hang [control]"
    vars:
      scenarioId: TC-G1-pytest-hang
      prompt: "{{file://scenarios/TC-G1-pytest-hang/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-G1 pytest-hang [treatment]"
    vars:
      scenarioId: TC-G1-pytest-hang
      prompt: "{{file://scenarios/TC-G1-pytest-hang/PROMPT.md}}"
      intervention:
        type: lesson
        ids:
          - always-add-timeout-and-p-nocacheprovider-013f
    assert:
      - type: javascript
        value: "file://scripts/assert-hidden-check.mjs"

# Output
outputPath: results/cache/smoke-run.json
sharing: false
