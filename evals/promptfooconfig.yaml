description: "lessons-learned lesson effectiveness eval suite"

# Primary agent provider — runs Claude Code in a materialized workspace
providers:
  - id: file://providers/claude-agent.mjs
    label: claude-code
    config:
      model: claude-sonnet-4-6
      timeout: 300000        # 5 min per arm

prompts:
  - '{{prompt}}'

defaultTest:
  options:
    provider: file://providers/claude-agent.mjs
    timeout: 300000

# Lifecycle extensions: inject lesson snapshot before each test, print judge summary after all
extensions:
  - file://scripts/hooks/before-each.mjs:beforeEach
  - file://scripts/hooks/after-all.mjs:afterAll

evaluateOptions:
  # maxConcurrency: 1 guarantees all control arms complete before treatment arms run,
  # so control transcript files exist when the judge reads them.
  maxConcurrency: 1

tests:
  # ── Control arms (ALL controls first) ──────────────────────────────────────
  # Running all controls before treatments ensures control-{hash}.json files
  # exist when treatment arms call the Tier 3 judge.

  - description: "TC-H3 hardcoded-secrets [control]"
    vars:
      scenarioId: TC-H3-hardcoded-secrets
      prompt: "{{file://scenarios/TC-H3-hardcoded-secrets/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-G1 pytest-hang [control]"
    vars:
      scenarioId: TC-G1-pytest-hang
      prompt: "{{file://scenarios/TC-G1-pytest-hang/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-H1 git-worktree [control]"
    vars:
      scenarioId: TC-H1-git-worktree
      prompt: "{{file://scenarios/TC-H1-git-worktree/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-H2 eval-injection [control]"
    vars:
      scenarioId: TC-H2-eval-injection
      prompt: "{{file://scenarios/TC-H2-eval-injection/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-P1 subagent-tools [control]"
    vars:
      scenarioId: TC-P1-subagent-tools
      prompt: "{{file://scenarios/TC-P1-subagent-tools/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-P2 hook-schema [control]"
    vars:
      scenarioId: TC-P2-hook-schema
      prompt: "{{file://scenarios/TC-P2-hook-schema/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-P3 overfitted-fix [control]"
    vars:
      scenarioId: TC-P3-overfitted-fix
      prompt: "{{file://scenarios/TC-P3-overfitted-fix/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-D1 speculative-abstractions [control]"
    vars:
      scenarioId: TC-D1-speculative-abstractions
      prompt: "{{file://scenarios/TC-D1-speculative-abstractions/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  - description: "TC-D3 collaborative-planning [control]"
    vars:
      scenarioId: TC-D3-collaborative-planning
      prompt: "{{file://scenarios/TC-D3-collaborative-planning/PROMPT.md}}"
      intervention:
        type: none
        ids: []

  # ── Treatment arms (ALL treatments after all controls) ──────────────────────

  - description: "TC-H3 hardcoded-secrets [treatment]"
    vars:
      scenarioId: TC-H3-hardcoded-secrets
      prompt: "{{file://scenarios/TC-H3-hardcoded-secrets/PROMPT.md}}"
      intervention:
        type: lesson
        ids:
          - never-write-literal-secret-values-into-s-b226
    assert:
      - type: javascript
        value: "file://scripts/assert-hidden-check.mjs"
      - type: javascript
        value: "file://scripts/assert-judge.mjs"

  - description: "TC-G1 pytest-hang [treatment]"
